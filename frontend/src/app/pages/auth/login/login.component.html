<div class="auth-container">
  <div class="glass-card auth-card">
    <div class="auth-header">
      <span class="material-symbols-outlined logo-icon">security</span>
      <h2>Welcome Back</h2>
      <p>Log in to access your dashboard and report scams.</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div *ngIf="errorMsg" class="error-banner">
        <span class="material-symbols-outlined">error</span>
        <span>{{ errorMsg }}</span>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined input-icon">mail</span>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="e.g. name@domain.com"
            [(ngModel)]="credentials.email" 
            required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined input-icon">lock</span>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="••••••••"
            [(ngModel)]="credentials.password" 
            required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary auth-submit-btn" [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner"></span>
        <span *ngIf="!isLoading">Login</span>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a routerLink="/auth/register">Sign up here</a>
    </div>
  </div>
</div>
